---
deployment:
  tasks:
    - export DEPLOYPATH=/home1/stmarys2/public_html
    - /bin/mkdir -p ${DEPLOYPATH}
    - /bin/mkdir -p ${DEPLOYPATH}/app
    - /bin/mkdir -p ${DEPLOYPATH}/assets
    - /bin/cp -R app/* ${DEPLOYPATH}/app
    - /bin/cp -R public/assets/* ${DEPLOYPATH}/assets
    - /bin/cp public/.htaccess ${DEPLOYPATH}/.htaccess
    - /bin/cp index.php ${DEPLOYPATH}/index.php
    - /bin/cp bootstrap.php ${DEPLOYPATH}/bootstrap.php
    - /bin/cp server.php ${DEPLOYPATH}/server.php
